name: Build & Release Spine Sorter

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Generate PDF manual
      shell: bash
      run: python generate_pdf_manual.py

    - name: Copy PDF to fixed name
      shell: bash
      run: |
        # Sort by version number descending, pick the newest PDF
        PDF=$(ls Spine_Sorter_v*_Artist_Guide.pdf 2>/dev/null | sort -t'v' -k2 -V | tail -1)
        if [ -n "$PDF" ]; then
          cp "$PDF" "Spine_Sorter_Artist_Guide.pdf"
          echo "Bundling: $PDF"
        else
          echo "No PDF found - falling back to USER_MANUAL.txt only"
        fi

    - name: Build with PyInstaller
      shell: bash
      run: |
        ARGS=(
          --noconfirm --onefile --windowed
          --name "SpineSorter-Windows"
          --add-data "USER_MANUAL.txt;."
        )
        if [ -f "Spine_Sorter_Artist_Guide.pdf" ]; then
          ARGS+=(--add-data "Spine_Sorter_Artist_Guide.pdf;.")
        fi
        pyinstaller "${ARGS[@]}" "spine sorter 257.py"

    - name: Upload to Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/SpineSorter-Windows.exe

    - name: Upload Artifact (manual run)
      if: "!startsWith(github.ref, 'refs/tags/')"
      uses: actions/upload-artifact@v4
      with:
        name: Spine-Sorter-Windows
        path: dist/SpineSorter-Windows.exe


  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Generate PDF manual
      run: python generate_pdf_manual.py

    - name: Copy PDF to fixed name
      shell: bash
      run: |
        # Sort by version number descending, pick the newest PDF
        PDF=$(ls Spine_Sorter_v*_Artist_Guide.pdf 2>/dev/null | sort -t'v' -k2 -V | tail -1)
        if [ -n "$PDF" ]; then
          cp "$PDF" "Spine_Sorter_Artist_Guide.pdf"
          echo "Bundling: $PDF"
        else
          echo "No PDF found - falling back to USER_MANUAL.txt only"
        fi

    - name: Build with PyInstaller
      shell: bash
      run: |
        ARGS=(
          --noconfirm --onefile --windowed
          --name "SpineSorter-Mac"
          --add-data "USER_MANUAL.txt:."
        )
        if [ -f "Spine_Sorter_Artist_Guide.pdf" ]; then
          ARGS+=(--add-data "Spine_Sorter_Artist_Guide.pdf:.")
        fi
        pyinstaller "${ARGS[@]}" "spine sorter 257.py"

    - name: Zip macOS app
      shell: bash
      run: |
        cd dist
        zip -r "SpineSorter-Mac.zip" "SpineSorter-Mac.app"

    - name: Upload to Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/SpineSorter-Mac.zip

    - name: Upload Artifact (manual run)
      if: "!startsWith(github.ref, 'refs/tags/')"
      uses: actions/upload-artifact@v4
      with:
        name: Spine-Sorter-macOS
        path: dist/SpineSorter-Mac.zip
